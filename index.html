<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Video Maker</title>
    <style>
        /* 画面全体の背景を「絶対的な黒」に強制固定（PCの余白対策） */
        html {
            background-color: #000 !important;
        }

        body {
            margin: 0;
            padding: 30px 0;
            width: 100%;
            min-height: 100vh; /* 画面の縦幅いっぱいに背景を広げる */
            background-color: #000 !important;
            color: #fff;
            font-family: sans-serif;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        
        h1 {
            font-size: 1.8rem;
            margin: 0 0 25px 0;
        }

        /* コントロールエリアの調整（ボタン同士を離す） */
        .controls { 
            margin-bottom: 35px; /* 画像との間隔を広げる */
            padding: 20px; 
            background: #111; 
            border-radius: 8px; 
            text-align: center;
            width: 90%;
            max-width: 450px;
            box-sizing: border-box;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(255,255,255,0.02);
        }

        /* ファイル選択ボタンを大きく押しやすく */
        .file-input-wrapper {
            margin-bottom: 25px; /* ★ダウンロードボタンとの距離をしっかり離す */
            text-align: left;
        }
        
        input[type="file"] {
            display: block;
            width: 100%;
            padding: 12px;
            background: #222;
            color: #fff;
            border: 1px dashed #444;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            cursor: pointer;
        }

        /* 生成・ダウンロードボタン */
        .action-btn { 
            padding: 14px 28px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            background: #fff; 
            color: #000;
            border: none; 
            border-radius: 6px; 
            width: 100%;
            transition: background 0.2s;
        }
        .action-btn:hover {
            background: #ddd;
        }
        .action-btn:disabled { 
            background: #444; 
            color: #888; 
            cursor: not-allowed; 
        }

        /* プレビュー枠：画像の比率に合わせる */
        #canvas-container { 
            width: 100%;
            max-width: 960px;
            max-height: 60vh; 
            background-color: #000 !important;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { 
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; 
            display: block;
            background-color: #000 !important;
        }

        /* PC（画面幅768px以上）での個別レイアウト */
        @media (min-width: 768px) {
            body { padding-top: 50px; }
            h1 { font-size: 2.2rem; margin-bottom: 35px; }
            .controls { width: 100%; max-width: 600px; padding: 25px; }
            #canvas-container { width: 90%; max-height: 55vh; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>Slide Video Maker</h1>
    
    <div class="controls">
        <div class="file-input-wrapper">
            <input type="file" id="image-upload" multiple accept="image/*">
        </div>
        <button id="start-btn" class="action-btn" disabled>動画を生成・ダウンロード</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        const uploadInput = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        let textures = [];
        let currentTextureIndex = 0;
        let mesh, material, renderer, scene, camera;
        let clock = new THREE.Clock();

        uploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;
            const loader = new THREE.TextureLoader();
            textures = [];
            currentTextureIndex = 0;
            let loadedCount = 0;
            Array.from(files).forEach((file, index) => {
                const url = URL.createObjectURL(file);
                loader.load(url, (texture) => {
                    texture.minFilter = THREE.LinearFilter;
                    textures[index] = texture;
                    loadedCount++;
                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        initThree(); 
                    }
                });
            });
        });

        function updateSceneSize(texture) {
            if (!texture || !texture.image) return;

            const imgWidth = texture.image.width;
            const imgHeight = texture.image.height;
            const imgAspect = imgWidth / imgHeight;

            if (imgWidth >= imgHeight) {
                renderer.setSize(1920, 1920 / imgAspect);
            } else {
                renderer.setSize(1080 * imgAspect, 1080);
            }

            camera.aspect = imgAspect;
            camera.updateProjectionMatrix();

            mesh.geometry.dispose();
            mesh.geometry = new THREE.PlaneGeometry(imgAspect, 1);
            
            camera.position.set(0, 0, 1.207);
            camera.lookAt(0, 0, 0);
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setClearColor(0x000000, 1.0);
            
            container.appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(1, 1);
            material = new THREE.MeshBasicMaterial({ map: textures[0], transparent: true });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            updateSceneSize(textures[0]);

            clock.getDelta();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            if (elapsedTime > 0 && Math.floor(elapsedTime) % 4 === 0) {
                if (textures.length > 1) {
                    const nextIndex = Math.floor(elapsedTime / 4) % textures.length;
                    if (currentTextureIndex !== nextIndex) {
                        currentTextureIndex = nextIndex;
                        material.map = textures[currentTextureIndex];
                        updateSceneSize(textures[currentTextureIndex]);
                    }
                }
            }
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30);
            
            let options = { mimeType: 'video/webm' };
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options = { mimeType: 'video/webm;codecs=vp9' };
            }
            
            const mediaRecorder = new MediaRecorder(stream, options);
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
