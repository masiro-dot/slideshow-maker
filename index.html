<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slide Video Maker</title>
    <style>
#canvas-container { 
            width: 800px; 
            height: 450px; 
            margin: 20px auto; 
            background: #000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>3D Slide Video Maker</h1>
    
    <div class="controls">
        <input type="file" id="image-upload" multiple accept="image/*">
        <button id="start-btn" disabled>動画を生成・ダウンロード</button>
    </div>

    <div id="canvas-container"></div>

    <script>
const uploadInput = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        let textures = [];
        let currentTextureIndex = 0;
        let mesh, material, renderer, scene, camera;
        let clock = new THREE.Clock();

        // 基準となる動画の枠サイズ（16:9の1080p）
        const VIDEO_WIDTH = 1920;
        const VIDEO_HEIGHT = 1080;

        uploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;

            const loader = new THREE.TextureLoader();
            textures = [];
            currentTextureIndex = 0;

            let loadedCount = 0;
            Array.from(files).forEach((file, index) => {
                const url = URL.createObjectURL(file);
                loader.load(url, (texture) => {
                    texture.minFilter = THREE.LinearFilter;
                    textures[index] = texture;
                    loadedCount++;

                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        initThree(); 
                    }
                });
            });
        });

        // ★ 画像の比率に合わせて、Three.js上の板のサイズを調整する関数
        function resizeMeshToTexture(texture) {
            if (!texture || !texture.image) return;

            const imgWidth = texture.image.width;
            const imgHeight = texture.image.height;
            const imgAspect = imgWidth / imgHeight;

            // 16:9の画面枠（基準サイズ）
            const baseWidth = 5.33;
            const baseHeight = 3.0;
            const screenAspect = baseWidth / baseHeight;

            let finalWidth, finalHeight;

            // 画像が画面枠より横長の場合、横幅を基準に収める
            if (imgAspect > screenAspect) {
                finalWidth = baseWidth;
                finalHeight = baseWidth / imgAspect;
            } else {
                // 画像が画面枠より縦長（または正方形に近い）場合、縦幅を基準に収める
                finalHeight = baseHeight;
                finalWidth = baseHeight * imgAspect;
            }

            // 既存のメッシュの形状（ジオメトリ）を新しい比率に更新
            mesh.geometry.dispose();
            mesh.geometry = new THREE.PlaneGeometry(finalWidth, finalHeight);
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            scene = new THREE.Scene();
            
            camera = new THREE.PerspectiveCamera(45, VIDEO_WIDTH / VIDEO_HEIGHT, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(VIDEO_WIDTH, VIDEO_HEIGHT);
            
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            container.appendChild(renderer.domElement);

            // 初期状態は仮のサイズで作る
            const geometry = new THREE.PlaneGeometry(1, 1);
            material = new THREE.MeshBasicMaterial({ map: textures[0], transparent: true });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // 最初の画像の比率を適用
            resizeMeshToTexture(textures[0]);

            clock.getDelta();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            
            // 4秒ごとに次の画像へ切り替え
            if (elapsedTime > 0 && Math.floor(elapsedTime) % 4 === 0) {
                if (textures.length > 1) {
                    const nextIndex = Math.floor(elapsedTime / 4) % textures.length;
                    
                    // 画像が切り替わるときだけ比率の再計算を行う
                    if (currentTextureIndex !== nextIndex) {
                        currentTextureIndex = nextIndex;
                        material.map = textures[currentTextureIndex];
                        resizeMeshToTexture(textures[currentTextureIndex]);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30);
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];

            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = videoURL;
                a.download = 'slideshow.webm';
                a.click();
                startBtn.textContent = '動画を生成・ダウンロード';
                startBtn.disabled = false;
            };

            mediaRecorder.start();
            startBtn.textContent = '録画中...';
            startBtn.disabled = true;

            setTimeout(() => {
                mediaRecorder.stop();
            }, textures.length * 4000);
        });
    </script>
</body>
</html>
