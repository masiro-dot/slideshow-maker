<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide Video Maker</title>
    <style>
<style>
        /* 背景をすべて黒に設定 */
        body { 
            margin: 0; 
            font-family: sans-serif; 
            background: #000; 
            color: #fff; 
            text-align: center; 
            padding: 20px 10px; /* スマホ用に左右に少し余白 */
            box-sizing: border-box;
        }
        
        h1 {
            font-size: 1.8rem; /* スマホでも大きすぎないサイズ */
            margin-bottom: 15px;
        }

        .controls { 
            margin: 0 auto 20px auto; 
            padding: 15px; 
            background: #111; 
            border-radius: 8px; 
            display: inline-block;
            max-width: 100%; /* 画面からはみ出さないように */
            box-sizing: border-box;
        }

        input[type="file"] {
            max-width: 100%;
            margin-bottom: 10px;
        }

        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #fff; 
            color: #000;
            border: none; 
            border-radius: 4px; 
            width: auto;
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* ★ ここを大幅に修正：スマホでもPCでも画面中央に16:9でフィットさせる */
        #canvas-container { 
            width: 100%; 
            max-width: 800px;       /* PCでの最大サイズ */
            aspect-ratio: 16 / 9;   /* 常に16:9の比率を維持 */
            margin: 20px auto; 
            background: #000; 
            box-shadow: 0 4px 20px rgba(255,255,255,0.05); 
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
        }
    </style>
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>Slide Video Maker</h1>
    
    <div class="controls">
        <input type="file" id="image-upload" multiple accept="image/*">
        <button id="start-btn" disabled>動画を生成・ダウンロード</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        const uploadInput = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        let textures = [];
        let currentTextureIndex = 0;
        let mesh, material, renderer, scene, camera;
        let clock = new THREE.Clock();

        const VIDEO_WIDTH = 1920;
        const VIDEO_HEIGHT = 1080;

        uploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;
            const loader = new THREE.TextureLoader();
            textures = [];
            currentTextureIndex = 0;
            let loadedCount = 0;
            Array.from(files).forEach((file, index) => {
                const url = URL.createObjectURL(file);
                loader.load(url, (texture) => {
                    texture.minFilter = THREE.LinearFilter;
                    textures[index] = texture;
                    loadedCount++;
                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        initThree(); 
                    }
                });
            });
        });

        function resizeMeshToTexture(texture) {
            if (!texture || !texture.image) return;
            const imgAspect = texture.image.width / texture.image.height;
            const baseWidth = 5.33;
            const baseHeight = 3.0;
            const screenAspect = baseWidth / baseHeight;
            let finalWidth, finalHeight;
            if (imgAspect > screenAspect) {
                finalWidth = baseWidth;
                finalHeight = baseWidth / imgAspect;
            } else {
                finalHeight = baseHeight;
                finalWidth = baseHeight * imgAspect;
            }
            mesh.geometry.dispose();
            mesh.geometry = new THREE.PlaneGeometry(finalWidth, finalHeight);
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); // Three.jsの背景も黒
            camera = new THREE.PerspectiveCamera(45, VIDEO_WIDTH / VIDEO_HEIGHT, 0.1, 1000);
            camera.position.z = 5;
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(VIDEO_WIDTH, VIDEO_HEIGHT);
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            container.appendChild(renderer.domElement);
            const geometry = new THREE.PlaneGeometry(1, 1);
            material = new THREE.MeshBasicMaterial({ map: textures[0], transparent: true });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);
            resizeMeshToTexture(textures[0]);
            clock.getDelta();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            // ズームなし（固定表示）
            if (elapsedTime > 0 && Math.floor(elapsedTime) % 4 === 0) {
                if (textures.length > 1) {
                    const nextIndex = Math.floor(elapsedTime / 4) % textures.length;
                    if (currentTextureIndex !== nextIndex) {
                        currentTextureIndex = nextIndex;
                        material.map = textures[currentTextureIndex];
                        resizeMeshToTexture(textures[currentTextureIndex]);
                    }
                }
            }
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30);
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = videoURL;
                a.download = 'slideshow.webm';
                a.click();
                startBtn.textContent = '動画を生成・ダウンロード';
                startBtn.disabled = false;
            };
            mediaRecorder.start();
            startBtn.textContent = '録画中...';
            startBtn.disabled = true;
            setTimeout(() => {
                mediaRecorder.stop();
            }, textures.length * 4000);
        });
    </script>
</body>
</html>
