<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Video Maker</title>
    <style>
        /* 画面全体の背景を完全な黒に */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: sans-serif;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }
        
        h1 {
            font-size: 1.6rem;
            margin: 10px 0;
        }

        .controls { 
            margin-bottom: 20px; 
            padding: 15px; 
            background: #111; 
            border-radius: 8px; 
            text-align: center;
            max-width: 90%;
        }

        input[type="file"] {
            margin-bottom: 10px;
            display: block;
            width: 100%;
        }

        button { 
            padding: 10px 20px; 
            font-size: 16px; 
            cursor: pointer; 
            background: #fff; 
            color: #000;
            border: none; 
            border-radius: 4px; 
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* PC・スマホ共通：常に画面中央に16:9で配置されるコンテナ */
        #canvas-container { 
            width: 90%; 
            max-width: 800px;  /* PCでの最大サイズ */
            aspect-ratio: 16 / 9;   /* 常に16:9を維持 */
            background: #000; 
            margin: 0 auto;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas { 
            width: 100% !important; 
            height: 100% !important; 
            display: block; 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>Slide Video Maker</h1>
    
    <div class="controls">
        <input type="file" id="image-upload" multiple accept="image/*">
        <button id="start-btn" disabled>動画を生成・ダウンロード</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        const uploadInput = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        let textures = [];
        let currentTextureIndex = 0;
        let mesh, material, renderer, scene, camera;
        let clock = new THREE.Clock();

        // 出力動画の解像度（16:9 フルHDに固定）
        const VIDEO_WIDTH = 1920;
        const VIDEO_HEIGHT = 1080;

        uploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;
            const loader = new THREE.TextureLoader();
            textures = [];
            currentTextureIndex = 0;
            let loadedCount = 0;
            Array.from(files).forEach((file, index) => {
                const url = URL.createObjectURL(file);
                loader.load(url, (texture) => {
                    texture.minFilter = THREE.LinearFilter;
                    textures[index] = texture;
                    loadedCount++;
                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        initThree(); 
                    }
                });
            });
        });

        // ★ 横長・縦長を判別し、16:9の枠内に完全に収める計算に修正
        function resizeMeshToTexture(texture) {
            if (!texture || !texture.image) return;
            
            const imgAspect = texture.image.width / texture.image.height;
            
            // 画面の基準サイズ（カメラの視野に合わせた仮想の大きさ）
            const screenHeight = 3.0;
            const screenWidth = screenHeight * (VIDEO_WIDTH / VIDEO_HEIGHT); // 5.333...
            const screenAspect = VIDEO_WIDTH / VIDEO_HEIGHT;

            let finalWidth, finalHeight;

            if (imgAspect > screenAspect) {
                // 画像が画面枠より「横長」の場合：横幅を基準に合わせる
                finalWidth = screenWidth;
                finalHeight = screenWidth / imgAspect;
            } else {
                // 画像が画面枠より「縦長」または「正方形」の場合：縦幅を基準に合わせる
                finalHeight = screenHeight;
                finalWidth = screenHeight * imgAspect;
            }

            mesh.geometry.dispose();
            mesh.geometry = new THREE.PlaneGeometry(finalWidth, finalHeight);
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000); // 背景を完全な黒に
            
            camera = new THREE.PerspectiveCamera(45, VIDEO_WIDTH / VIDEO_HEIGHT, 0.1, 1000);
            camera.position.set(0, 0, 3.62); // 画面にぴったり収まるカメラ位置に固定
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(VIDEO_WIDTH, VIDEO_HEIGHT);
            
            // CSSによる表示サイズ制御
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            container.appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(1, 1);
            material = new THREE.MeshBasicMaterial({ map: textures[0], transparent: true });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            resizeMeshToTexture(textures[0]);
            
            // ★ ウィンドウサイズが変わった時（スマホの向き変更など）のズレを防止
            window.addEventListener('resize', onWindowResize, false);

            clock.getDelta();
            animate();
        }

        function onWindowResize() {
            if (camera && renderer) {
                // 内部解像度は 1920x1080 を維持したまま、表示位置を再計算
                camera.aspect = VIDEO_WIDTH / VIDEO_HEIGHT;
                camera.updateProjectionMatrix();
                renderer.setSize(VIDEO_WIDTH, VIDEO_HEIGHT);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            if (elapsedTime > 0 && Math.floor(elapsedTime) % 4 === 0) {
                if (textures.length > 1) {
                    const nextIndex = Math.floor(elapsedTime / 4) % textures.length;
                    if (currentTextureIndex !== nextIndex) {
                        currentTextureIndex = nextIndex;
                        material.map = textures[currentTextureIndex];
                        resizeMeshToTexture(textures[currentTextureIndex]);
                    }
                }
            }
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30);
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = videoURL;
                a.download = 'slideshow.webm';
                a.click();
                startBtn.textContent = '動画を生成・ダウンロード';
                startBtn.disabled = false;
            };
            mediaRecorder.start();
            startBtn.textContent = '録画中...';
            startBtn.disabled = true;
            setTimeout(() => {
                mediaRecorder.stop();
            }, textures.length * 4000);
        });
    </script>
</body>
</html>
