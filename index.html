<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slide Video Maker</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding-top: 20px; }
        #canvas-container { width: 640px; height: 360px; margin: 20px auto; background: #000; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; display: block; }
        .controls { margin: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>3D Slide Video Maker</h1>
    
    <div class="controls">
        <input type="file" id="image-upload" multiple accept="image/*">
        <button id="start-btn" disabled>動画を生成・ダウンロード</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- ここにJavaScriptをすべてまとめました ---
        const uploadInput = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        let textures = [];
        let currentTextureIndex = 0;
        let mesh, material, renderer, scene, camera;
        let clock = new THREE.Clock();

        // 1. 画像がアップロードされた時の処理
        uploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;

            const loader = new THREE.TextureLoader();
            textures = [];
            currentTextureIndex = 0;

            let loadedCount = 0;
            Array.from(files).forEach((file, index) => {
                const url = URL.createObjectURL(file);
                loader.load(url, (texture) => {
                    // 画像の縦横比を維持するための設定
                    texture.minFilter = THREE.LinearFilter;
                    textures[index] = texture; // 順番を維持して格納
                    loadedCount++;

                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        // すべて読み込んだらThree.jsを起動
                        initThree(); 
                    }
                });
            });
        });

        // 2. Three.js の初期化と画面構築（確実に定義）
        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = ''; // 古いキャンバスをクリア

            // シーンとカメラの準備
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, 640 / 360, 0.1, 1000);
            camera.position.z = 5;

            // レンダラーの準備
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(640, 360);
            container.appendChild(renderer.domElement);

            // 画像を表示する板（プレーン）を作成
            const geometry = new THREE.PlaneGeometry(5.33, 3); // 16:9 の比率
            material = new THREE.MeshBasicMaterial({ map: textures[0], transparent: true });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            clock.getDelta(); // クロックのリセット
            animate();
        }

        // 3. アニメーション（4秒ごとに画像を切り替える簡易ループ）
        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            
            // 簡易的なズームイン効果（動画らしさを出す）
            if (mesh) {
                mesh.scale.set(1 + (elapsedTime % 4) * 0.03, 1 + (elapsedTime % 4) * 0.03, 1);
            }

            // 4秒ごとに次の画像へ切り替え
            if (elapsedTime > 0 && Math.floor(elapsedTime) % 4 === 0) {
                if (textures.length > 1) {
                    currentTextureIndex = Math.floor(elapsedTime / 4) % textures.length;
                    material.map = textures[currentTextureIndex];
                }
            }

            renderer.render(scene, camera);
        }

        // 4. 動画キャプチャ・ダウンロード処理
        startBtn.addEventListener('click', () => {
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30); // 30fps
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];

            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = videoURL;
                a.download = 'slideshow.webm';
                a.click();
                startBtn.textContent = '動画を生成・ダウンロード';
                startBtn.disabled = false;
            };

            // 録画開始（とりあえず画像枚数×4秒分を録画）
            mediaRecorder.start();
            startBtn.textContent = '録画中...';
            startBtn.disabled = true;

            setTimeout(() => {
                mediaRecorder.stop();
            }, textures.length * 4000);
        });
    </script>
</body>
</html>
