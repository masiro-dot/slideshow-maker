<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Slide Video Maker</title>
    <style>
#canvas-container { 
            width: 800px; 
            height: 450px; 
            margin: 20px auto; 
            background: #000; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); 
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>3D Slide Video Maker</h1>
    
    <div class="controls">
        <input type="file" id="image-upload" multiple accept="image/*">
        <button id="start-btn" disabled>動画を生成・ダウンロード</button>
    </div>

    <div id="canvas-container"></div>

    <script>
const uploadInput = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        let textures = [];
        let currentTextureIndex = 0;
        let mesh, material, renderer, scene, camera;
        let clock = new THREE.Clock();

        // ★ 解像度の設定（フルHD: 1920 * 1080 に変更）
        const VIDEO_WIDTH = 1920;
        const VIDEO_HEIGHT = 1080;

        uploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;

            const loader = new THREE.TextureLoader();
            textures = [];
            currentTextureIndex = 0;

            let loadedCount = 0;
            Array.from(files).forEach((file, index) => {
                const url = URL.createObjectURL(file);
                loader.load(url, (texture) => {
                    texture.minFilter = THREE.LinearFilter;
                    textures[index] = texture;
                    loadedCount++;

                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        initThree(); 
                    }
                });
            });
        });

        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';

            scene = new THREE.Scene();
            
            // ★ アスペクト比を 16:9（1920/1080）に固定
            camera = new THREE.PerspectiveCamera(45, VIDEO_WIDTH / VIDEO_HEIGHT, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            
            // ★ レンダラーに高解像度を設定
            renderer.setSize(VIDEO_WIDTH, VIDEO_HEIGHT);
            
            // ★ 画面上での見た目が大きくなりすぎないようCSSで制御
            renderer.domElement.style.width = '100%';
            renderer.domElement.style.height = '100%';
            
            container.appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(5.33, 3); // 16:9 の比率
            material = new THREE.MeshBasicMaterial({ map: textures[0], transparent: true });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            clock.getDelta();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            
            // ★ 画像が近づく（ズームする）コードを削除しました（動かない設定）

            // 4秒ごとに次の画像へ切り替え
            if (elapsedTime > 0 && Math.floor(elapsedTime) % 4 === 0) {
                if (textures.length > 1) {
                    currentTextureIndex = Math.floor(elapsedTime / 4) % textures.length;
                    material.map = textures[currentTextureIndex];
                }
            }

            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30); // 30fps
            const mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            const chunks = [];

            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = videoURL;
                a.download = 'slideshow.webm';
                a.click();
                startBtn.textContent = '動画を生成・ダウンロード';
                startBtn.disabled = false;
            };

            mediaRecorder.start();
            startBtn.textContent = '録画中...';
            startBtn.disabled = true;

            setTimeout(() => {
                mediaRecorder.stop();
            }, textures.length * 4000);
        });
    </script>
</body>
</html>
