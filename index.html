<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Video Maker</title>
    <style>
        /* 画面全体・すべての要素を完全な黒に強制 */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000 !important;
            color: #fff;
            font-family: sans-serif;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }
        
        h1 {
            font-size: 1.5rem;
            margin: 0 0 15px 0;
        }

        .controls { 
            margin-bottom: 20px; 
            padding: 15px; 
            background: #111; 
            border-radius: 8px; 
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            z-index: 10;
        }

        input[type="file"] {
            margin-bottom: 12px;
            display: block;
            width: 100%;
        }

        button { 
            padding: 12px 24px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            background: #fff; 
            color: #000;
            border: none; 
            border-radius: 4px; 
            width: 100%;
        }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* プレビュー枠：16:9固定を廃止し、画像の比率に合わせる */
        #canvas-container { 
            width: 100%;
            max-width: 960px;
            /* スマホで縦長画像が画面縦からはみ出さないよう、最大高さを制限 */
            max-height: 60vh; 
            background-color: #000 !important;
            margin: auto 0; /* 上下中央配置 */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        canvas { 
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* 画像の比率を維持して最大化 */
            display: block;
            background-color: #000 !important;
        }

        @media (min-width: 768px) {
            body { padding-top: 30px; }
            h1 { font-size: 2rem; }
            .controls { width: auto; max-width: none; }
            button { width: auto; }
            #canvas-container { 
                width: 90%; 
                max-height: 65vh;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <h1>Slide Video Maker</h1>
    
    <div class="controls">
        <input type="file" id="image-upload" multiple accept="image/*">
        <button id="start-btn" disabled>動画を生成・ダウンロード</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        const uploadInput = document.getElementById('image-upload');
        const startBtn = document.getElementById('start-btn');
        let textures = [];
        let currentTextureIndex = 0;
        let mesh, material, renderer, scene, camera;
        let clock = new THREE.Clock();

        uploadInput.addEventListener('change', (e) => {
            const files = e.target.files;
            if (!files.length) return;
            const loader = new THREE.TextureLoader();
            textures = [];
            currentTextureIndex = 0;
            let loadedCount = 0;
            Array.from(files).forEach((file, index) => {
                const url = URL.createObjectURL(file);
                loader.load(url, (texture) => {
                    texture.minFilter = THREE.LinearFilter;
                    textures[index] = texture;
                    loadedCount++;
                    if (loadedCount === files.length) {
                        startBtn.disabled = false;
                        initThree(); 
                    }
                });
            });
        });

        // 画像の「本来の比率」に合わせて画面（レンダラー・カメラ）をリサイズする
        function updateSceneSize(texture) {
            if (!texture || !texture.image) return;

            const imgWidth = texture.image.width;
            const imgHeight = texture.image.height;
            const imgAspect = imgWidth / imgHeight;

            // 1. レンダラー（Canvas内部）の解像度を画像の比率に合わせる
            // 縦横の長い方を基準に高解像度化
            if (imgWidth >= imgHeight) {
                renderer.setSize(1920, 1920 / imgAspect);
            } else {
                renderer.setSize(1080 * imgAspect, 1080);
            }

            // 2. カメラのアスペクト比も画像に同期
            camera.aspect = imgAspect;
            camera.updateProjectionMatrix();

            // 3. 画像を貼り付ける板（Mesh）も画像と同じ比率（サイズ1）にする
            mesh.geometry.dispose();
            mesh.geometry = new THREE.PlaneGeometry(imgAspect, 1);
            
            // 4. カメラの距離を調整して、画像が画面ぴったりに映るようにする
            // PerspectiveCamera(45) で高さ1の物体をぴったり収める距離は約1.207
            camera.position.set(0, 0, 1.207);
            camera.lookAt(0, 0, 0);
        }

        function initThree() {
            const container = document.getElementById('canvas-container');
            container.innerHTML = '';
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            
            // 初期設定（サイズは後で更新される）
            camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setClearColor(0x000000, 1.0);
            
            container.appendChild(renderer.domElement);

            const geometry = new THREE.PlaneGeometry(1, 1);
            material = new THREE.MeshBasicMaterial({ map: textures[0], transparent: true });
            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // 最初の画像の比率を適用
            updateSceneSize(textures[0]);

            clock.getDelta();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();
            
            if (elapsedTime > 0 && Math.floor(elapsedTime) % 4 === 0) {
                if (textures.length > 1) {
                    const nextIndex = Math.floor(elapsedTime / 4) % textures.length;
                    if (currentTextureIndex !== nextIndex) {
                        currentTextureIndex = nextIndex;
                        material.map = textures[currentTextureIndex];
                        // 画像切り替え時に比率を自動更新
                        updateSceneSize(textures[currentTextureIndex]);
                    }
                }
            }
            renderer.render(scene, camera);
        }

        startBtn.addEventListener('click', () => {
            const canvas = renderer.domElement;
            const stream = canvas.captureStream(30);
            
            // 主要なブラウザで動くビデオコーデックを設定
            let options = { mimeType: 'video/webm' };
            if (MediaRecorder.isTypeSupported('video/webm;codecs=vp9')) {
                options = { mimeType: 'video/webm;codecs=vp9' };
            }
            
            const mediaRecorder = new MediaRecorder(stream, options);
            const chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                const videoURL = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = videoURL;
                a.download = 'slideshow.webm';
                a.click();
                startBtn.textContent = '動画を生成・ダウンロード';
                startBtn.disabled = false;
            };
            mediaRecorder.start();
            startBtn.textContent = '録画中...';
            startBtn.disabled = true;
            setTimeout(() => {
                mediaRecorder.stop();
            }, textures.length * 4000);
        });
    </script>
</body>
</html>
